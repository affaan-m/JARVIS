<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTER — Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    color: #00ff88;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  input {
    background: #1a1a2e;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;
    width: 200px;
  }
  input:focus { outline: none; border-color: #00ff88; }
  button {
    background: #00ff88;
    color: #0a0a0a;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:hover { background: #00cc6a; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  button.disconnect { background: #ff4444; color: white; }
  .video-container {
    position: relative;
    max-width: 720px;
    width: 100%;
  }
  /* Live video is now the primary display */
  .video-container video {
    width: 100%;
    background: #111;
    border-radius: 8px;
    border: 1px solid #222;
    display: block;
  }
  /* Canvas overlay for detection boxes */
  #overlayCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: block;
  }
  /* Hidden capture canvas */
  #captureCanvas { display: none; }
  .hud {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: #888;
  }
  .hud span { color: #00ff88; }
  #status {
    margin-bottom: 10px;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 20px;
    background: #1a1a2e;
  }
  #status.connected { color: #00ff88; border: 1px solid #00ff8844; }
  #status.connecting { color: #ffaa00; border: 1px solid #ffaa0044; }
  #status.error { color: #ff4444; border: 1px solid #ff444444; }
  .source-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .source-toggle button {
    background: #1a1a2e;
    color: #888;
    border: 1px solid #333;
    font-weight: 500;
  }
  .source-toggle button.active {
    background: #00ff88;
    color: #0a0a0a;
    border-color: #00ff88;
  }
</style>
</head>
<body>

<h1>SPECTER VIEWER</h1>

<div class="source-toggle">
  <button id="btnGlasses" class="active" onclick="setSource('glasses')">Glasses (WebRTC)</button>
  <button id="btnWebcam" onclick="setSource('webcam')">Webcam</button>
</div>

<div id="status" class="connecting">Disconnected</div>

<!-- Glasses mode controls -->
<div class="controls" id="glassesControls">
  <input type="text" id="roomCode" placeholder="Room code" autocomplete="off">
  <button id="btnConnect" onclick="connectGlasses()">Connect</button>
</div>

<!-- Webcam mode controls -->
<div class="controls" id="webcamControls" style="display:none;">
  <button id="btnStartCam" onclick="startWebcam()">Start Webcam</button>
  <button id="btnStopCam" class="disconnect" onclick="stopWebcam()" style="display:none;">Stop</button>
</div>

<div class="video-container">
  <!-- Live video (glasses or webcam) — primary display -->
  <video id="liveVideo" autoplay playsinline muted></video>
  <!-- Canvas overlay for detection boxes -->
  <canvas id="overlayCanvas"></canvas>
</div>

<div class="hud">
  <div>Detect: <span id="hudMs">—</span> ms</div>
  <div>People: <span id="hudPeople">0</span></div>
  <div>FPS: <span id="hudFps">—</span></div>
</div>

<!-- Hidden capture canvas for JPEG encoding -->
<canvas id="captureCanvas"></canvas>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const SIGNAL_HOST = 'visionclaw-signal.fly.dev';
const SIGNAL_PASSWORD = 'VCLAW1';
const SIGNAL_URL = `wss://:${SIGNAL_PASSWORD}@${SIGNAL_HOST}`;
const TURN_URL = `https://${SIGNAL_HOST}/api/turn`;
const CAPTURE_WIDTH = 320;  // Match server INPUT_SIZE for minimal bandwidth
const JPEG_QUALITY = 0.4;   // Detection-quality, not display quality

let source = 'glasses';
let ws = null;               // WebSocket to /ws/detect (JSON)
let sigWs = null;
let pc = null;
let webcamStream = null;
let pendingFrame = false;    // Flow control: true while waiting for server response
let glassesActive = false;   // True while glasses mode is intentionally connected
let glassesRoom = '';        // Room code for auto-reconnect

// FPS tracking
let fpsFrames = 0;
let fpsLast = performance.now();

// Box interpolation state
let prevBoxes = [];          // Previous detection boxes (normalized coords)
let targetBoxes = [];        // Target detection boxes to interpolate toward
let lastDetectTime = 0;      // Timestamp of last detection response
let detectInterval = 200;    // Estimated ms between detections (adapts)

const liveVideo     = document.getElementById('liveVideo');
const overlayCanvas = document.getElementById('overlayCanvas');
const overlayCtx    = overlayCanvas.getContext('2d');
const captureCanvas = document.getElementById('captureCanvas');
const captureCtx    = captureCanvas.getContext('2d');
const statusEl      = document.getElementById('status');
const hudMs         = document.getElementById('hudMs');
const hudPeople     = document.getElementById('hudPeople');
const hudFps        = document.getElementById('hudFps');

// ---------------------------------------------------------------------------
// Source toggle
// ---------------------------------------------------------------------------
function setSource(s) {
  source = s;
  document.getElementById('btnGlasses').classList.toggle('active', s === 'glasses');
  document.getElementById('btnWebcam').classList.toggle('active', s === 'webcam');
  document.getElementById('glassesControls').style.display = s === 'glasses' ? 'flex' : 'none';
  document.getElementById('webcamControls').style.display = s === 'webcam' ? 'flex' : 'none';
  if (s === 'glasses') stopWebcam();
  if (s === 'webcam') disconnectGlasses();
}

// ---------------------------------------------------------------------------
// WebSocket to /ws/detect (JSON detections)
// ---------------------------------------------------------------------------
function ensureWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return Promise.resolve(ws);
  return new Promise((resolve, reject) => {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/detect`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      console.log('[WS] Connected to /ws/detect');
      resolve(ws);
    };
    ws.onerror = (e) => {
      console.error('[WS] Error', e);
      reject(e);
    };
    ws.onclose = () => {
      console.log('[WS] Disconnected — will auto-reconnect in 2s');
      ws = null;
      pendingFrame = false;
      setTimeout(() => {
        if (source === 'glasses' && glassesActive || source === 'webcam' && webcamStream) {
          console.log('[WS] Auto-reconnecting...');
          ensureWS().catch(e => console.warn('[WS] Reconnect failed:', e));
        }
      }, 2000);
    };
    ws.onmessage = (evt) => {
      const result = JSON.parse(evt.data);
      pendingFrame = false;

      // Update HUD
      hudMs.textContent = result.process_time_ms.toFixed(0);
      hudPeople.textContent = result.detections.length;

      // Update detection targets for interpolation
      const now = performance.now();
      if (lastDetectTime > 0) {
        detectInterval = now - lastDetectTime;
      }
      lastDetectTime = now;

      // Shift current interpolated boxes to prev, set new targets
      prevBoxes = getCurrentInterpolatedBoxes();
      targetBoxes = result.detections;

      // FPS counter
      fpsFrames++;
      if (now - fpsLast >= 1000) {
        hudFps.textContent = (fpsFrames / ((now - fpsLast) / 1000)).toFixed(1);
        fpsFrames = 0;
        fpsLast = now;
      }

      // Flow control: send next frame immediately after receiving response
      sendFrame();
    };
  });
}

// ---------------------------------------------------------------------------
// Frame capture + send (request-response flow control)
// ---------------------------------------------------------------------------
function sendFrame() {
  if (pendingFrame) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!liveVideo.videoWidth || !liveVideo.videoHeight) return;

  // Scale to CAPTURE_WIDTH to reduce JPEG size and match server input
  const aspect = liveVideo.videoHeight / liveVideo.videoWidth;
  captureCanvas.width = CAPTURE_WIDTH;
  captureCanvas.height = Math.round(CAPTURE_WIDTH * aspect);
  captureCtx.drawImage(liveVideo, 0, 0, captureCanvas.width, captureCanvas.height);

  captureCanvas.toBlob((blob) => {
    if (blob && ws && ws.readyState === WebSocket.OPEN) {
      pendingFrame = true;
      blob.arrayBuffer().then(buf => {
        ws.send(buf);
      }).catch(err => {
        console.warn('[Send] Error:', err);
        pendingFrame = false;
      });
    }
  }, 'image/jpeg', JPEG_QUALITY);
}

// Kick off detection loop — retries quickly until video is ready
function startDetectionLoop() {
  console.log('[Detection] Loop started');
  let waitingLogCount = 0;
  // Retry every 200ms until first frame succeeds, then request-response takes over
  const initInterval = setInterval(() => {
    if (!pendingFrame) {
      if (!liveVideo.videoWidth || !liveVideo.videoHeight) {
        if (waitingLogCount++ % 10 === 0) {
          console.log('[Detection] Waiting for video to be ready (videoWidth=' + liveVideo.videoWidth + ')');
        }
        return;
      }
      sendFrame();
      // Once a frame was sent successfully, slow down the safety interval
      if (pendingFrame) {
        clearInterval(initInterval);
        console.log('[Detection] First frame sent, switching to request-response');
        // Safety fallback in case a response is dropped
        setInterval(() => {
          if (!pendingFrame) sendFrame();
        }, 500);
      }
    }
  }, 200);
}

// ---------------------------------------------------------------------------
// Box interpolation + canvas overlay (smooth 30+ FPS perceived)
// ---------------------------------------------------------------------------
function getCurrentInterpolatedBoxes() {
  if (targetBoxes.length === 0) return [];
  if (prevBoxes.length === 0) return targetBoxes;

  const elapsed = performance.now() - lastDetectTime;
  const t = Math.min(elapsed / detectInterval, 1.0);

  return targetBoxes.map((target, i) => {
    const prev = prevBoxes[i] || target;
    // Match by name (tracking ID) if possible
    const matched = prevBoxes.find(b => b.name === target.name) || prev;
    return {
      x1: matched.x1 + (target.x1 - matched.x1) * t,
      y1: matched.y1 + (target.y1 - matched.y1) * t,
      x2: matched.x2 + (target.x2 - matched.x2) * t,
      y2: matched.y2 + (target.y2 - matched.y2) * t,
      name: target.name,
      confidence: target.confidence,
      color: target.color,
    };
  });
}

function drawOverlay() {
  // Sync canvas resolution to video display size
  const rect = liveVideo.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) {
    requestAnimationFrame(drawOverlay);
    return;
  }
  overlayCanvas.width = rect.width;
  overlayCanvas.height = rect.height;

  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  const boxes = getCurrentInterpolatedBoxes();
  const w = overlayCanvas.width;
  const h = overlayCanvas.height;

  for (const box of boxes) {
    const x1 = box.x1 * w;
    const y1 = box.y1 * h;
    const x2 = box.x2 * w;
    const y2 = box.y2 * h;

    // Box outline
    overlayCtx.strokeStyle = box.color || '#00FF00';
    overlayCtx.lineWidth = 2;
    overlayCtx.strokeRect(x1, y1, x2 - x1, y2 - y1);

    // Label background
    const label = `${box.name} ${(box.confidence * 100).toFixed(0)}%`;
    overlayCtx.font = '14px SF Mono, Fira Code, monospace';
    const metrics = overlayCtx.measureText(label);
    const labelH = 20;
    overlayCtx.fillStyle = box.color || '#00FF00';
    overlayCtx.fillRect(x1, y1 - labelH, metrics.width + 8, labelH);

    // Label text
    overlayCtx.fillStyle = '#000000';
    overlayCtx.fillText(label, x1 + 4, y1 - 5);
  }

  requestAnimationFrame(drawOverlay);
}

// Start the animation loop
requestAnimationFrame(drawOverlay);

// ---------------------------------------------------------------------------
// Glasses mode: VisionClaw WebRTC signaling
// ---------------------------------------------------------------------------
// Cleanup WebRTC + signaling without resetting UI (used before reconnect)
function cleanupGlassesConnection() {
  if (pc) { try { pc.close(); } catch(e) {} pc = null; }
  if (sigWs) {
    const old = sigWs;
    sigWs = null;
    old.onclose = null; // prevent triggering reconnect loop
    old.close();
  }
}

async function connectGlasses() {
  const room = glassesRoom || document.getElementById('roomCode').value.trim();
  if (!room) { alert('Enter a room code'); return; }
  glassesRoom = room;
  glassesActive = true;

  const btnConnect = document.getElementById('btnConnect');
  btnConnect.disabled = true;
  setStatus('connecting', 'Connecting to glasses...');

  try {
    let iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
    ];
    try {
      // Try without Authorization header first (avoids CORS preflight block)
      let turnResp = await fetch(TURN_URL).catch(() => null);
      // Fall back to auth header if no-auth fails
      if (!turnResp || !turnResp.ok) {
        turnResp = await fetch(TURN_URL, {
          headers: { 'Authorization': 'Basic ' + btoa(':' + SIGNAL_PASSWORD) }
        }).catch(() => null);
      }
      if (turnResp && turnResp.ok) {
        const turnData = await turnResp.json();
        if (turnData.iceServers) {
          iceServers = turnData.iceServers;
          console.log('[TURN] Got TURN servers:', iceServers.length);
        }
      }
    } catch (e) {
      console.warn('[TURN] Failed to fetch, using STUN only:', e);
    }

    await ensureWS();

    pc = new RTCPeerConnection({ iceServers });
    pc.addTransceiver('video', { direction: 'recvonly' });

    pc.ontrack = (evt) => {
      console.log('[WebRTC] Got remote track:', evt.track.kind);
      if (evt.track.kind === 'video') {
        liveVideo.srcObject = evt.streams[0];
        liveVideo.play().catch(() => {});
        startDetectionLoop();
        setStatus('connected', 'Glasses connected — streaming');
        btnConnect.textContent = 'Disconnect';
        btnConnect.classList.add('disconnect');
        btnConnect.disabled = false;
        btnConnect.onclick = disconnectGlasses;
      }
    };

    pc.onicecandidate = (evt) => {
      if (evt.candidate && sigWs && sigWs.readyState === WebSocket.OPEN) {
        sigWs.send(JSON.stringify({
          type: 'candidate',
          candidate: evt.candidate.candidate,
          sdpMid: evt.candidate.sdpMid,
          sdpMLineIndex: evt.candidate.sdpMLineIndex,
        }));
      }
    };

    // ICE timeout: warn if stuck in "checking" for >15s (likely needs TURN)
    let iceCheckingTimer = null;
    pc.oniceconnectionstatechange = () => {
      console.log('[WebRTC] ICE state:', pc.iceConnectionState);
      if (pc.iceConnectionState === 'checking') {
        iceCheckingTimer = setTimeout(() => {
          if (pc && pc.iceConnectionState === 'checking') {
            console.warn('[WebRTC] ICE stuck in "checking" for 15s — STUN-only cannot traverse NAT. TURN relay is needed but CORS blocks credential fetch.');
            setStatus('error', 'ICE stuck — TURN relay needed (CORS blocked)');
          }
        }, 15000);
      } else {
        clearTimeout(iceCheckingTimer);
      }
      if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
        console.log('[WebRTC] ICE connected — video stream should be flowing');
        setStatus('connected', 'Glasses connected — streaming');
      }
      if (pc.iceConnectionState === 'disconnected') {
        console.warn('[WebRTC] ICE disconnected — attempting ICE restart...');
        setStatus('connecting', 'Reconnecting (ICE restart)...');
        try { pc.restartIce(); } catch (e) { console.warn('[WebRTC] ICE restart failed:', e); }
      }
      if (pc.iceConnectionState === 'failed') {
        console.error('[WebRTC] ICE failed — full reconnect in 3s');
        setStatus('connecting', 'Reconnecting...');
        setTimeout(() => {
          if (glassesActive && glassesRoom) {
            cleanupGlassesConnection();
            connectGlasses();
          }
        }, 3000);
      }
    };

    sigWs = new WebSocket(SIGNAL_URL);

    sigWs.onopen = () => {
      console.log('[Signal] Connected');
      sigWs.send(JSON.stringify({ type: 'join', room }));
    };

    sigWs.onmessage = async (evt) => {
      const msg = JSON.parse(evt.data);
      console.log('[Signal] Received:', msg.type);

      switch (msg.type) {
        case 'room_joined':
          console.log('[Signal] Joined room, waiting for glasses...');
          setStatus('connecting', 'In room — waiting for glasses...');
          break;

        case 'peer_joined':
          console.log('[Signal] Glasses connected, waiting for offer...');
          setStatus('connecting', 'Glasses connected — negotiating...');
          break;

        case 'offer':
          console.log('[Signal] Received offer, creating answer...');
          await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          sigWs.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
          break;

        case 'candidate':
          if (msg.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate({
              candidate: msg.candidate,
              sdpMid: msg.sdpMid,
              sdpMLineIndex: msg.sdpMLineIndex,
            }));
          }
          break;

        case 'peer_left':
          console.log('[Signal] Glasses peer left — waiting for rejoin...');
          setStatus('connecting', 'Glasses disconnected — waiting for rejoin...');
          // Don't full-reconnect; glasses may rejoin the same room
          break;

        case 'error':
          console.error('[Signal] Server error:', msg.message);
          setStatus('error', 'Signal error: ' + msg.message);
          break;

        default:
          console.log('[Signal] Unknown message type:', msg.type, msg);
      }
    };

    sigWs.onerror = (e) => {
      console.error('[Signal] Error:', e);
      setStatus('error', 'Signaling error');
    };
    sigWs.onclose = () => {
      console.log('[Signal] Disconnected');
      if (glassesActive && glassesRoom) {
        console.log('[Signal] Auto-reconnecting in 3s...');
        setStatus('connecting', 'Signal lost — reconnecting...');
        setTimeout(() => {
          if (glassesActive && glassesRoom) {
            cleanupGlassesConnection();
            connectGlasses();
          }
        }, 3000);
      }
    };

    // Signaling keepalive — send ping every 30s to prevent idle timeout
    const sigPing = setInterval(() => {
      if (sigWs && sigWs.readyState === WebSocket.OPEN) {
        sigWs.send(JSON.stringify({ type: 'ping' }));
      } else {
        clearInterval(sigPing);
      }
    }, 30000);

  } catch (err) {
    console.error('[Connect]', err);
    setStatus('error', 'Connection failed: ' + err.message);
    document.getElementById('btnConnect').disabled = false;
  }
}

function disconnectGlasses() {
  glassesActive = false;
  glassesRoom = '';
  cleanupGlassesConnection();
  liveVideo.srcObject = null;
  prevBoxes = [];
  targetBoxes = [];

  const btnConnect = document.getElementById('btnConnect');
  btnConnect.textContent = 'Connect';
  btnConnect.classList.remove('disconnect');
  btnConnect.disabled = false;
  btnConnect.onclick = connectGlasses;
  setStatus('connecting', 'Disconnected');
}

// ---------------------------------------------------------------------------
// Webcam mode
// ---------------------------------------------------------------------------
async function startWebcam() {
  try {
    setStatus('connecting', 'Starting webcam...');
    webcamStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
    });
    liveVideo.srcObject = webcamStream;
    await liveVideo.play();

    await ensureWS();
    startDetectionLoop();

    setStatus('connected', 'Webcam active');
    document.getElementById('btnStartCam').style.display = 'none';
    document.getElementById('btnStopCam').style.display = 'inline-block';
  } catch (err) {
    console.error('[Webcam]', err);
    setStatus('error', 'Webcam error: ' + err.message);
  }
}

function stopWebcam() {
  if (webcamStream) {
    webcamStream.getTracks().forEach(t => t.stop());
    webcamStream = null;
  }
  liveVideo.srcObject = null;
  prevBoxes = [];
  targetBoxes = [];
  document.getElementById('btnStartCam').style.display = 'inline-block';
  document.getElementById('btnStopCam').style.display = 'none';
  setStatus('connecting', 'Webcam stopped');
}

// ---------------------------------------------------------------------------
// Status helper
// ---------------------------------------------------------------------------
function setStatus(cls, text) {
  statusEl.className = cls;
  statusEl.textContent = text;
}

// ---------------------------------------------------------------------------
// Keepalive ping — prevents sandbox auto-stop while viewer is open
// ---------------------------------------------------------------------------
setInterval(() => {
  fetch('/api/health').catch(() => {});
}, 5 * 60 * 1000);

// Auto-connect to glasses room VCLAW1 on page load
document.getElementById('roomCode').value = 'VCLAW1';
connectGlasses();
</script>
</body>
</html>
